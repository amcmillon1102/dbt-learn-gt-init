models:
  - name: stg_jaffle_shop__customers
    description: description
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null

  - name: stg_jaffle_shop__jaffle_shop_orders
    description: One record per order
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: status
        description: "{{ doc('order_status')}}"
        data_tests:
          - accepted_values:
              values: ['placed', 'shipped', 'completed', 'returned', 'return_pending']